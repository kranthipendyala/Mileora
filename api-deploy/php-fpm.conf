; PHP-FPM pool tuning for the Mileora API container.
; Single pool, dynamic workers — sized for a 1 GB / 1 vCPU instance.
; Scale `pm.max_children` based on (available_memory / per_request_memory).

[www]
user = www-data
group = www-data

listen = 127.0.0.1:9000
listen.owner = www-data
listen.group = www-data

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

clear_env = no

access.log = /var/log/php/access.log
slowlog = /var/log/php/slow.log
request_slowlog_timeout = 5s
request_terminate_timeout = 60s

catch_workers_output = yes
decorate_workers_output = no
