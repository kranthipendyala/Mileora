; Production PHP overrides for the Mileora API container.

; Errors → log only, never display
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php/error.log

; Errors level — suppress CI3's PHP-8.1 deprecation noise but keep real bugs
error_reporting = E_ALL & ~E_DEPRECATED & ~E_USER_DEPRECATED & ~E_NOTICE

; Memory + time
memory_limit = 256M
max_execution_time = 60
max_input_time = 60
post_max_size = 16M
upload_max_filesize = 16M

; OpCache
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 8000
opcache.validate_timestamps = 0       ; rebuild only on deploy (faster)
opcache.fast_shutdown = 1
opcache.huge_code_pages = 1

; Session
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1

; Security
expose_php = Off
allow_url_fopen = On
allow_url_include = Off

date.timezone = Asia/Kolkata
