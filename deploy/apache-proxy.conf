# /etc/apache2/sites-available/mileora.com.conf
#
# Production Apache config — Next.js (PM2) for everything except /api/* and
# /static-assets, which are served directly by Apache.
#
# Modules required:
#   sudo a2enmod proxy proxy_http rewrite headers ssl http2
#   sudo a2ensite mileora.com

<VirtualHost *:80>
    ServerName mileora.com
    ServerAlias www.mileora.com
    Redirect permanent / https://mileora.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName mileora.com
    ServerAlias www.mileora.com

    DocumentRoot /var/www/mileora

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/mileora.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/mileora.com/privkey.pem

    Protocols h2 http/1.1

    # ---- Apex redirect ----
    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^www\. [NC]
    RewriteRule ^/(.*)$ https://mileora.com/$1 [R=301,L]

    # ---- CodeIgniter 3 API ----
    # Anything starting with /api/ goes to PHP-FPM via the CI3 front controller.
    Alias /api /var/www/mileora/api
    <Directory /var/www/mileora/api>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # ---- Next.js (Node via PM2 on :3000) ----
    ProxyPreserveHost On
    ProxyTimeout 60

    # Static assets handled by Next directly
    ProxyPass        /_next/   http://127.0.0.1:3000/_next/
    ProxyPassReverse /_next/   http://127.0.0.1:3000/_next/

    # Everything else → Next
    ProxyPass        /        http://127.0.0.1:3000/
    ProxyPassReverse /        http://127.0.0.1:3000/

    # Don't proxy /api or /uploads to Next
    ProxyPass        /api          !
    ProxyPass        /uploads      !

    # ---- Security headers ----
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog  ${APACHE_LOG_DIR}/mileora-error.log
    CustomLog ${APACHE_LOG_DIR}/mileora-access.log combined
</VirtualHost>
